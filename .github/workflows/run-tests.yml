name: run-tests
on:
  pull_request:
    branches:
      - "master"
jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Lint & Test
        run: yarn && yarn run test
